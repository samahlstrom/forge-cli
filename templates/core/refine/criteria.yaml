# refine criteria — binary evals for forge quality
# Two domains: init (harness generation) and deliver (pipeline execution)
# Each criterion is yes/no. Score = passes / total across N runs.
# Following autoresearch convention: simple, binary, automatable.

version: 2

# How many times to run per refinement iteration
runs_per_iteration: 3

# Time budgets (seconds)
time_budget:
  init: 120
  deliver: 600

# ============================================================
# DOMAIN 1: INIT — Does forge init produce a correct harness?
# ============================================================

init:
  # --- Gates (must all pass or run = 0) ---

  - id: init.runs
    question: "Did forge init exit 0?"
    type: gate
    measure: exit_code
    description: >
      Run forge init --yes against the fixture project.
      Exit code 0 = pass. Any crash, panic, or non-zero = fail.

  - id: init.files_exist
    question: "Were all expected files generated?"
    type: gate
    measure: file_check
    expected:
      - forge.yaml
      - CLAUDE.md
      - .claude/settings.json
      - .claude/skills/deliver/SKILL.md
      - .forge/pipeline/orchestrator.sh
      - .forge/pipeline/intake.sh
      - .forge/pipeline/classify.md
      - .forge/pipeline/decompose.md
      - .forge/pipeline/review-plan.md
      - .forge/pipeline/execute.md
      - .forge/pipeline/evaluate.md
      - .forge/pipeline/verify.sh
      - .forge/pipeline/deliver.sh
      - .forge/agents/architect.md
      - .forge/agents/edgar.md
      - .forge/agents/code-quality.md
      - .forge/agents/um-actually.md
      - .forge/context/stack.md
      - .forge/context/project.md
      - .forge/hooks/pre-edit.sh
      - .forge/hooks/session-start.sh
    description: >
      Check every file in the expected list exists on disk after init.
      Missing even one = fail.

  - id: init.valid_yaml
    question: "Is forge.yaml valid YAML with all required keys?"
    type: gate
    measure: yaml_parse
    required_keys:
      - version
      - project.name
      - commands.typecheck
      - commands.lint
      - commands.test
      - agents
      - verification
      - evaluation
      - pipeline
    description: >
      Parse forge.yaml. Check it's valid YAML and contains all required
      top-level and nested keys. Missing key or parse error = fail.

  - id: init.valid_json
    question: "Is settings.json valid JSON with permissions and hooks?"
    type: gate
    measure: json_parse
    required_keys:
      - permissions.allow
      - hooks
    description: >
      Parse .claude/settings.json. Must be valid JSON with permissions.allow
      array and hooks object. Parse error or missing keys = fail.

  # --- Quality (scored independently) ---

  - id: init.scripts_executable
    question: "Are all .sh files executable?"
    type: quality
    measure: file_mode
    description: >
      Check that every .sh file under .forge/ has the executable bit set.
      All executable = pass.

  - id: init.no_template_vars
    question: "Are all Handlebars variables resolved?"
    type: quality
    measure: grep_check
    pattern: "\\{\\{.*\\}\\}"
    description: >
      Grep all generated files for unresolved {{variable}} patterns.
      Zero matches = pass. Any leftover template variable = fail.

  - id: init.commands_detect
    question: "Did init detect the correct commands for the project?"
    type: quality
    measure: yaml_value_check
    description: >
      Read forge.yaml commands and verify they match what the fixture
      project actually uses (e.g., node --test for test, tsc for typecheck).
      Correct detection = pass.

  - id: init.idempotent
    question: "Does running init twice produce the same result?"
    type: quality
    measure: diff_check
    description: >
      Run forge init --yes twice. Diff the output directories.
      Identical output = pass. Any difference = fail.
      Tests the merge logic (CLAUDE.md sections, settings.json union).

  - id: init.fast
    question: "Did init finish under the time budget?"
    type: quality
    measure: wall_clock
    description: >
      Wall clock time from start to finish.
      Pass if under time_budget.init seconds.

# ============================================================
# DOMAIN 2: DELIVER — Does the pipeline produce good code?
# ============================================================

deliver:
  # --- Gates (must all pass or run = 0) ---

  - id: deliver.completes
    question: "Did the pipeline complete all stages and produce a PR?"
    type: gate
    measure: exit_code
    description: >
      Check the pipeline's exit code and whether a PR URL appears in output.
      If the pipeline crashes, errors out, or hangs past the time budget = fail.

  - id: deliver.builds
    question: "Does the resulting code compile/typecheck?"
    type: gate
    measure: typecheck_exit_code
    description: >
      Run the project's typecheck command against the branch the pipeline produced.
      Exit code 0 = pass.

  - id: deliver.tests_pass
    question: "Do all tests pass on the resulting branch?"
    type: gate
    measure: test_exit_code
    description: >
      Run the project's test command against the branch the pipeline produced.
      Exit code 0 = pass.

  # --- Quality (scored independently) ---

  - id: deliver.correct
    question: "Does the diff implement what the task asked for?"
    type: quality
    measure: llm_judge
    description: >
      An LLM reads the task description and the git diff, then answers yes/no:
      "Does this diff correctly and completely implement the requested change?"

  - id: deliver.scoped
    question: "Did the diff only touch files relevant to the task?"
    type: quality
    measure: llm_judge
    description: >
      An LLM reads the task description and the list of changed files, then yes/no:
      "Are all changed files directly relevant? No drive-by fixes or unrelated refactors."

  - id: deliver.fast
    question: "Did the pipeline finish within the time budget?"
    type: quality
    measure: wall_clock
    description: >
      Wall clock from pipeline start to PR creation.
      Pass if under time_budget.deliver seconds.

  - id: deliver.clean
    question: "Is the diff free of debug artifacts and anti-patterns?"
    type: quality
    measure: grep_check
    pattern: "console\\.log|debugger|TODO|FIXME|HACK"
    description: >
      Grep the diff for anti-patterns.
      Zero matches = pass.

# ============================================================
# SCORING
# ============================================================
#
# Per domain:
#   Gate criteria: if ANY gate fails, the entire run scores 0.
#   Quality criteria: each pass = 1 point.
#   Run score = (0 if any gate fails) else (quality_passes / quality_count)
#
# Iteration score = mean(run_scores) across runs_per_iteration runs.
# Combined score = (init_score + deliver_score) / 2
# Ratchet: keep if combined > best, else revert.
