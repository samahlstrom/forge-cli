# Refine criteria for /forge pipeline
# Usage: forge refine templates/core/refine/criteria-deliver.yaml
#
# Runs /forge against isomed-caregiver to fix real bugs,
# then scores the result. The refine loop mutates pipeline templates
# (skill-forge.md, agents, etc.) to improve delivery quality.

objective: |
  Improve the forge /forge pipeline so it reliably produces code that
  builds, passes tests, and correctly implements the requested task.
  The pipeline is tested against isomed-caregiver — a real TypeScript
  backend with Drizzle ORM, 337 tests, and known type errors to fix.

measure: "bash templates/core/refine/measure-deliver.sh"

primary: deliver_score

metrics:
  - name: deliver_score
    direction: maximize
    target: 1.0

  - name: tests_pass
    direction: maximize
    target: 1.0

  - name: ts_errors_fixed
    direction: maximize
    target: 1.0

  - name: diff_scoped
    direction: maximize
    target: 1.0

max_iterations: 25
idle_timeout: 600

scope:
  include:
    - templates/core/pipeline/
    - templates/core/agents/
    - templates/core/skill-forge.md.hbs
    - templates/core/CLAUDE.md.hbs
  exclude:
    - templates/core/refine/
    - cmd/
    - internal/
    - test/

stop_when:
  all_targets_met: true
  no_improvement_for: 5
