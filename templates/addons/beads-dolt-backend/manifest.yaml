name: beads-dolt-backend
description: "Upgrade bead storage to Dolt DB for versioned state and team sync"
version: 1
patches:
  forge_yaml:
    beads.backend: dolt
    addons:
      - "+beads-dolt-backend"
files:
  - source: dolt-setup.sh
    target: .forge/addons/dolt-setup.sh
post_install:
  - "bash .forge/addons/dolt-setup.sh"
