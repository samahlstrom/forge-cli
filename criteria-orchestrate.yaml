measure: "bash scripts/measure-orchestrate.sh 2>/dev/null | tail -1"

metrics:
  - name: "stages_passed"
    direction: "maximize"
    target: 9
  - name: "pipeline_score"
    direction: "maximize"
    target: 1.0
  - name: "intake_ok"
    direction: "maximize"
  - name: "classify_ok"
    direction: "maximize"
  - name: "decompose_ok"
    direction: "maximize"
  - name: "review_ok"
    direction: "maximize"
  - name: "verify_ok"
    direction: "maximize"
  - name: "evaluate_ok"
    direction: "maximize"
  - name: "eval_check_ok"
    direction: "maximize"

primary: "stages_passed"

objective: |
  Fix bugs in the forge pipeline orchestrator so that all 9 stages pass.
  The measure script sets up a fresh repo, runs forge init, and tests
  each pipeline stage transition (intake → classify → decompose → review →
  execute → verify → evaluate → deliver).

  Look at the measure script (scripts/measure-orchestrate.sh) to understand
  what each stage expects. Fix bugs in the orchestrator template at
  templates/core/pipeline/orchestrator.sh.hbs and related pipeline files.

  Do NOT edit the measure script itself.

scope:
  include:
    - "templates/core/pipeline/"
    - "templates/core/agents/"
    - "cmd/"
    - "internal/"
  exclude:
    - "scripts/measure-orchestrate.sh"
    - "criteria-orchestrate.yaml"
    - "go.mod"
    - "go.sum"

max_iterations: 15
budget_per_iteration: "1.00"
idle_timeout: 300

stop_when:
  all_targets_met: true
  no_improvement_for: 5
