# criteria-build.yaml — Does forge-cli build, pass vet, and pass tests?
# Starting point: validate the foundation works and improve it.

measure: "bash scripts/measure-build.sh"

metrics:
  - name: "test_pass_rate"
    direction: "maximize"
    target: 1.0
  - name: "build_ok"
    direction: "maximize"
    target: 1.0
  - name: "vet_ok"
    direction: "maximize"
    target: 1.0
  - name: "test_passed"
    direction: "maximize"
  - name: "build_ms"
    direction: "minimize"
  - name: "binary_bytes"
    direction: "minimize"

primary: "test_pass_rate"

objective: |
  Improve the forge-cli codebase. Focus areas in priority order:
  1. Add meaningful test coverage — unit tests for the refine package,
     intake quality scoring, and criteria parsing.
  2. Keep the build passing and vet clean.
  3. Keep binary size reasonable.

scope:
  include:
    - "cmd/"
    - "internal/"
  exclude:
    - "scripts/measure-build.sh"
    - "criteria-build.yaml"
    - "go.mod"
    - "go.sum"

max_iterations: 10
budget_per_iteration: "1.00"
idle_timeout: 300

stop_when:
  all_targets_met: false
  no_improvement_for: 4
