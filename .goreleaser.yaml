version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: forge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/samahlstrom/forge-cli/internal/static.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "forge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: samahlstrom
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: forge
    homepage: "https://github.com/samahlstrom/forge-cli"
    description: "Agent harness scaffolding for Claude Code"
    install: |
      bin.install "forge"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
